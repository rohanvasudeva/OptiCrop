<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<div class="logo">
🌿
</div>
<h1>OptiCrop</h1>
<p class="subtitle">
Smart Agricultural Production Optimization Engine
</p>
<form action="/predict" method="POST">
<div class="grid">
<div class="inputBox">
<label>Nitrogen (N)</label>
<input type="number" name="N" required>
</div>
<div class="inputBox">
<label>Phosphorus (P)</label>
<input type="number" name="P" required>
</div>
<div class="inputBox">
<label>Potassium (K)</label>
<input type="number" name="K" required>
</div>
<div class="inputBox">
<label>Temperature (°C)</label>
<input type="number" step="any" name="temperature" required>
</div>
<div class="inputBox">
<label>Humidity (%)</label>
<input type="number" step="any" name="humidity" required>
</div>
<div class="inputBox">
<label>Soil pH</label>
<input type="number" step="any" name="ph" required>
</div>
<div class="inputBox">
<label>Rainfall (mm)</label>
<input type="number" step="any" name="rainfall" required>
</div>
</div>
<button>
🌱 Predict Suitable Crop
</button>
</form>
{% if prediction %}
<div class="result">
<h2>Recommended Crop</h2>
<div class="crop">
{{ prediction }}
</div>
</div>
{% endif %}
<div class="footer">
Designed for Smart Agriculture • OptiCrop © 2026
</div>
</div>
</body>
</html>
